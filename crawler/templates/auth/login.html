{% extends 'base.html' %}


{% block content %}
  <h1 class="mb-5 text-center">{% block title %}Login{% endblock %}</h1>
  <div class="row">
    <div class="col-lg-6 offset-lg-3 col-md-8 offset-md-2">
        <form method="post">
            <div class="form-floating mb-3">
                <input required type="email" name="username" class="form-control" id="username">
                <label for="username" class="form-label">Username/Email</label>
            </div>
            <div class="form-floating mb-3">
                <input required type="password" name="password" class="form-control" id="password">
                <label for="password" class="form-label">Password</label>
            </div>
            <div class="mb-3">
                <div class="row">
                    <div class="col-8 offset-2 d-grid gap-2">
                        <button type="submit" class="btn btn-lg d-block btn-dark mb-3">Sign In</button>
                    </div>
                </div>
            </div>
        </form>
        <div class="text-center">
            <a href="{{url_for('auth.register')}}">New here? Register</a>
        </div>
        <div class="text-center">
            <a href="#">Forgot Password?</a>
        </div>
    </div>
  </div>
{% endblock %}
