{% extends 'base.html' %}


{% block content %}
  <h1 class="fs-2 text-center text-uppercase fw-bold">{% block title %}Register{% endblock %}</h1>
  <h2 class="fs-5 fw-light text-center mb-5">Become A Member!</h2>
  <div class="row">
    <div class="col-lg-6 offset-lg-3 col-md-8 offset-md-2">
        <form method="post">
            <div class="form-floating mb-3">
                <input required type="email" name="username" class="form-control" id="username">
                <label for="username" class="form-label">Username/Email</label>
            </div>
            <div class="form-floating mb-3">
                <input required type="password" name="password" class="form-control" id="password">
                <label for="password" class="form-label">Set Password</label>
            </div>
            <div class="mb-3">
                <div class="row">
                    <div class="col-8 offset-2 d-grid gap-2">
                        <button type="submit" class="btn btn-lg d-block btn-dark mb-3">Sign Up</button>
                    </div>
                </div>
            </div>
        </form>
        <div class="text-center">
            <a href="{{url_for('auth.login')}}">Already a member? Go to Login</a>
        </div>
    </div>
  </div>
{% endblock %}
