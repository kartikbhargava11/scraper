{% extends 'base.html' %}


{% block content %}
  <h1 class="text-center fs-2 fw-bold text-uppercase">{% block title %}Deep Crawling{% endblock %}</h1>
  <h2 class="text-center fs-5 fw-light mb-5">Explore a website beyond a single page and explore all links at one depth before moving deeper.</h2>
  <div class="row">
    <div class="col-lg-6 offset-lg-3">
      <form method="post">
        <div class="form-floating mb-3">
          <input required type="text" name="url" class="form-control" id="url" placeholder="https://example.com">
          <label for="url" class="form-label">URL to Crawl</label>
        </div>
        <div class="form-floating mb-3">
          <input type="number" min="1" max="5" name="max-depth" class="form-control" id="max-depth" placeholder="Enter number between 1 and 5" value="5">
          <label for="max-depth" class="form-label">Max Depth</label>
        </div>
        <div class="form-floating mb-3">
          <input type="number" min="1" max="100" name="max-pages" class="form-control" id="max-pages" placeholder="Enter number between 1 and 100" value="10">
          <label for="max-pages" class="form-label">Max Pages</label>
        </div>
        <div class="form-floating mb-3">
          <select class="form-select" id="job-type" name="job-type" aria-label="Select Job Type">
            <option selected value="DEEP_CRAWLING">Deep Crawling</option>
            <option value="DEEP_CRAWLING">Prefetch (Fast)</option>
            <option disabled value="FIRECRAWL_MAP">Map (COMING SOON)</option>
          </select>
          <label for="job-type">Crawl Strategy</label>
        </div>
        <div class="mb-3">
          <div class="row">
            <div class="col-8 offset-2 d-grid gap-2">
              <button type="submit" class="btn btn-lg d-block btn-dark mb-3">Get Internal Links</button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
