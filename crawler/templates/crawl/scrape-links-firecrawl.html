{% extends 'base.html' %}


{% block content %}
  <h1 class="text-center fs-3 font-monospace">{% block title %}Deep Crawling - Firecrawl{% endblock %}</h1>
  <h2 class="text-center fs-5 fw-light">Explore a website beyond a single page and explore all links at one depth before moving deeper</h2>
  <div class="row">
    <div class="col-lg-6 offset-lg-3">
      <form method="post">
        <div class="form-floating mb-3">
          <input required type="text" name="url" class="form-control" id="url" placeholder="https://example.com">
          <label for="url" class="form-label">URL</label>
        </div>
        <div class="form-floating mb-3">
          <input type="number" min="1" max="5" name="max_depth" class="form-control" id="max_depth" placeholder="Enter number between 1 and 5">
          <label for="max_depth" class="form-label">Max Depth</label>
        </div>
        <div class="form-floating mb-3">
          <input type="number" min="1" max="10" name="max_pages" class="form-control" id="max_pages" placeholder="Enter number between 1 and 5">
          <label for="max_pages" class="form-label">Max Pages</label>
        </div>
        <div class="mb-3">
          <div class="row">
            <div class="col-8 offset-2 d-grid gap-2">
              <button type="submit" class="btn btn-lg d-block btn-dark mb-3">Scrape Internal Links</button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
