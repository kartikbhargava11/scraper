{% extends 'base.html' %}
{% block content %}
    <div class="row gap-5">
        <div class="col-12">
            <h1 class="fs-2 text-center text-uppercase fw-bold">{% block title %}Reliable, large-scale web extraction.{% endblock %}</h1>
            <h2 class="fs-5 fw-light text-center">AI-ready web crawling tailored for LLMs, AI agents, and data pipelines. Fully built for real-time performance.</h2>
        </div>
        <div class="col-12">
            <div class="d-flex gap-2 flex-column flex-md-row align-items-center justify-content-center">
                <a class="btn btn-lg d-block btn-dark rounded-0" href="{{url_for('crawl.scrape_links')}}">Scrape Links</a>

                <a class="btn btn-lg d-block btn-outline-dark rounded-0" href="{{url_for('crawl.scrape_markup')}}">Scrape Markup</a>
            </div>
        </div>
    </div>
{% endblock %}
